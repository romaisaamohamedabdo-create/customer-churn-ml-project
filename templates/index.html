<!DOCTYPE html>
<html>
<head>
    <title>Customer Churn Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            color: black;
            width: 350px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <h1>📊 Customer Churn Prediction</h1>

    <div class="container">

        <form action="/predict" method="post">

            <input type="number" name="tenure" placeholder="Tenure (months)" required>

            <input type="number" step="0.01" name="MonthlyCharges" placeholder="Monthly Charges ($)" required>

            <input type="number" step="0.01" name="TotalCharges" placeholder="Total Charges ($)" required>

            <button type="submit">Predict</button>

        </form>

        <div class="result" style="color: green;">
            {{ prediction_text }}
        </div>

    </div>

</body>
</html>
